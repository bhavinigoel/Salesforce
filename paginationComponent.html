<template>
    <lightning-card title="Account Pagination Example">

        <!-- No Records Case -->
        <template if:true={noRecords}>
            <div class="slds-align_absolute-center slds-p-around_medium">
                No Accounts Found
            </div>
        </template>

        <!-- Datatable -->
        <template if:false={noRecords}>
            <lightning-datatable
                    key-field="Id"
                    data={paginatedData}
                    columns={columns}
                    hide-checkbox-column>
            </lightning-datatable>


            <!-- Pagination Controls -->
            <div class="pagination-container">

                <lightning-button
                        label="First"
                        onclick={goToFirstPage}
                        disabled={isFirstPage}>
                </lightning-button>

                <lightning-button
                        label="Previous"
                        onclick={goToPreviousPage}
                        disabled={isFirstPage}>
                </lightning-button>


                <!-- Page Numbers -->
                <template for:each={pageNumbers} for:item="page">

                    <button
                            key={page}
                            class={page.buttonClass}
                            data-page={page.number}
                            onclick={handlePageClick}>

                        {page.number}

                    </button>

                </template>


                <lightning-button
                        label="Next"
                        onclick={goToNextPage}
                        disabled={isLastPage}>
                </lightning-button>


                <lightning-button
                        label="Last"
                        onclick={goToLastPage}
                        disabled={isLastPage}>
                </lightning-button>

            </div>

        </template>

    </lightning-card>
</template>
